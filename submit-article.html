<section class="section section--light"><div class="container" style="max-width:760px;"><form class="site-form" action="https://formsubmit.co/geopolis.pub@gmail.com" method="POST" enctype="multipart/form-data"><input type="hidden" name="_subject" value="New GEOPOLIS Article Submission"><input type="hidden" name="_captcha" value="false"><input type="hidden" name="_next" value="/thank-you.html"><label>Name</label><input name="name" required><label>Email</label><input type="email" name="email" required><label>Category</label><select name="category" required><option value="">Select category</option><option>Research Articles</option><option>Policy Briefs</option><option>Opinion</option><option>Book Reviews</option></select><label>Title</label><input name="article_title" required><label>Abstract</label><textarea name="abstract" rows="5" required></textarea><label>Upload document (doc/pdf)</label><input type="file" name="manuscript" accept=".pdf,.doc,.docx" required><button class="btn btn--gold" type="submit">Submit Article</button></form></div></section>
